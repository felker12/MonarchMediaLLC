name: Deploy API to Azure Container App

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Show repository contents
        run: |
          pwd
          ls -la
          echo ""
          echo "Repository tree:"
          find . -maxdepth 3

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: .
          acrName: acrsouv4otnps5h4
          containerAppName: apiservice
          resourceGroup: rg-mmllc
          dockerfilePath: ./MonarchMediaLLC.ApiService/Dockerfile