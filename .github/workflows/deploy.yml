name: Deploy API to Azure Container App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Log in using your Azure Service Principal credentials
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Build the project folder, push it to ACR, and cycle the Container App revision
      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: acrsouv4otnps5h4
          containerAppName: apiservice
          resourceGroup: rg-mmllc
          dockerfilePath: ./MonarchMediaLLC.ApiService/Dockerfile